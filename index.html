<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chaos Banana 🍌</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
text-align:center;
overflow-x:hidden;
}

.hero{
    padding:140px 20px 90px;
background:linear-gradient(135deg,#111,#1b1b1b);
}

h1{
    font-size: clamp(52px, 10vw, 96px);
    color:#FFD700;
    text-shadow:0 0 20px rgba(255,215,0,.6);
    line-height:1;
    margin-bottom:20px;
}
font-size:60px;
color:#FFD700;
text-shadow:0 0 20px #FFD700;
}

p{
font-size:22px;
color:#ddd;
margin:20px auto;
max-width:700px;
}

.btn{
display:inline-block;
margin:12px;
padding:16px 35px;
background:#FFD700;
color:#111;
font-weight:bold;
text-decoration:none;
border-radius:50px;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

.section{
padding:70px 20px;
}

.card{
background:#1b1b1b;
max-width:850px;
margin:auto;
padding:30px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,215,0,.15);
}

h2{
color:#FFD700;
margin-bottom:20px;
}

.count{
font-size:40px;
color:#FFD700;
margin-top:20px;
}

footer{
padding:40px;
color:#888;
}

.banana{
position:fixed;
font-size:30px;
top:-50px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(120vh);
}
}
</style>

</head>

<body>

<div class="hero">

<h1>🍌 CHAOS BANANA</h1>

<p>
The most chaotic meme coin on Solana.
No fear. No rules.
Only bananas.
</p>

<a href="#" class="btn">🚀 Buy on Pump.fun</a>

<a href="https://x.com" class="btn">🐦 Follow on X</a>

</div>
<div class="section">
  <h2>🍌 Coming Soon</h2>
  <p>Chaos Banana is evolving into the ultimate meme coin experience.</p>

  <div class="count">🚀 Launch Soon</div>
</div>

<footer>
  © 2026 Chaos Banana. All Rights Reserved.
</footer>

</body>
</html>
